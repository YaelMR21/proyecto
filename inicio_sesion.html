<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Registro Profesional</title>
    <link rel="stylesheet" href="estilo_inicio_sesion.css">
</head>
<body>

    <div class="shape shape-top"></div>
    <div class="shape shape-bottom"></div>

    <div class="container">
        
        <div class="text-section">
            <h1>Bienvenido próximo<span class="highlight-text">Profesional</span></h1>
            <p>Simplifica cada etapa de tu proceso de titulación, desde el registro de tu proyecto hasta la revisión final. Nuestra plataforma está diseñada para brindarte el soporte técnico y administrativo que necesitas para alcanzar tu meta académica sin contratiempos.</p>
        </div>

        <div class="form-section">
            <div class="form-card">
                <form>
                    <div class="name-row input-group">
                        <input type="text" placeholder="Nombre(s)" required>
                        <input type="text" placeholder="Apellido" required>
                    </div>

                    <div class="input-group">
                        <input type="email" placeholder="Correo Institucional" required>
                    </div>


                    <div class="input-group">
                        <input type="password" placeholder="Contraseña" required>
                    </div>

                    
                    <button type="submit" class="register-btn">Registrar</button>
                </form>

            </div>
        </div>
    </div>

</body>
</html>
